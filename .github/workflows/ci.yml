name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check installed package health
        run: python -m pip check

      - name: Compile Python sources
        run: |
          python -m compileall -q \
            agents bot config data database execution memo orchestrator \
            scanning scoring screening scripts tracking utils main.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
