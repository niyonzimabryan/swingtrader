<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Swing Trader Telegram memo preview</title>
  <desc id="desc">Illustrative screenshot-style preview of a Swing Trader memo arriving in Telegram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17212b"/>
      <stop offset="1" stop-color="#0e1621"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="170" y="44" width="620" height="452" rx="28" fill="#111b26" filter="url(#shadow)"/>
  <rect x="170" y="44" width="620" height="72" rx="28" fill="#223247"/>
  <circle cx="218" cy="80" r="22" fill="#4aa3ff"/>
  <text x="252" y="75" fill="#f4f7fb" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Swing Trader Bot</text>
  <text x="252" y="99" fill="#9fb2c8" font-family="Inter, Arial, sans-serif" font-size="14">paper-trading research memo</text>

  <rect x="210" y="148" width="500" height="260" rx="18" fill="#182533"/>
  <text x="238" y="186" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">AAPL trade memo</text>
  <text x="238" y="218" fill="#a7f3d0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Decision: WATCHLIST · Score 7.2/10</text>

  <line x1="238" y1="240" x2="682" y2="240" stroke="#2f4157"/>
  <text x="238" y="274" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Why it matters</text>
  <text x="238" y="302" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">Catalyst, fundamentals, pattern history, and web research</text>
  <text x="238" y="325" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">rolled into one operator-readable memo.</text>

  <text x="238" y="365" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Paper trade plan</text>
  <text x="238" y="392" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">Entry, stop, targets, risk, and approve/reject buttons.</text>

  <rect x="238" y="426" width="136" height="42" rx="12" fill="#16a34a"/>
  <text x="277" y="453" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Approve</text>
  <rect x="390" y="426" width="116" height="42" rx="12" fill="#334155"/>
  <text x="427" y="453" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Pass</text>
  <rect x="522" y="426" width="152" height="42" rx="12" fill="#334155"/>
  <text x="552" y="453" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Watchlist</text>
</svg>
